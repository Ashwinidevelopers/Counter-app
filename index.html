<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter</title>
</head>
<style>
    body{
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 100px;
    }
    button{
     padding: 10px 20px;
     background-color: blueviolet;
     color: blanchedalmond;
     border:none;
     cursor: pointer;

    }
  h1{
    font-size: 50px;
 }
</style>
<body>
    <h1 id="count">0</h1>
    <button onclick="increase()">Click me</button>

    
    <script>
        let c=0;
        function increase(){
            c++
            document.getElementById("count").innerText=c;
        }
    </script>
</body>
</html>
